[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "provably-sdk"
version = "0.1.0"
description = "Provably Python SDK — runtime init, HTTP intercept, handoff transport, deterministic evaluator, trusted-endpoint registry."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Proprietary" }
authors = [{ name = "Provably Technologies Ltd" }]
keywords = ["provably", "verifiable", "agent", "handoff", "interceptor"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Operating System :: OS Independent",
]
dependencies = [
    "httpx>=0.26",
    "jsonschema>=4.0",
    "psycopg2-binary>=2.9",
    "pydantic>=2.6",
    "requests>=2.31",
    "structlog>=24.1",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "ruff>=0.3", "build>=1.2"]

[project.urls]
Homepage = "https://github.com/ProvablyAI/provably-python-sdk"
Issues = "https://github.com/ProvablyAI/provably-python-sdk/issues"

[tool.setuptools.packages.find]
where = ["src"]
include = ["provably*"]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "W"]

[tool.ruff.lint.isort]
known-first-party = ["provably"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "."]
markers = [
    "e2e: end-to-end tests that drive the SDK against a real loopback HTTP server",
]

# Local docker-compose for provably-sdk.
#
# Builds the SDK "test" stage and runs `ruff check` + `pytest -q` inside
# the container. No database service is included — the test suite is fully
# hermetic (no live Postgres required).
#
# Quick commands:
#   docker compose run --rm sdk                       # run unit + e2e suites
#   docker compose run --rm sdk pytest -q -m e2e      # only e2e tests
#   docker compose run --rm sdk ruff check            # only lint

services:
  sdk:
    build:
      context: .
      target: test
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

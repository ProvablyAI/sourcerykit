name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install
        run: uv sync --extra dev --locked

      - name: Pre-commit
        run: uv run pre-commit run --all-files

      - name: Pytest
        run: uv run pytest -q --cov=agentkit --cov-report=term-missing --cov-fail-under=60

      - name: Sphinx
        run: uv run sphinx-build -W -b html docs docs/_build/html

      - name: Upload built docs as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: docs/_build/html

      - name: Build package
        run: uv build

  docker:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          load: true
          tags: provably-sdk:runtime

      - name: Smoke-import SDK from runtime image
        run: docker run --rm provably-sdk:runtime

  deploy-docs:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

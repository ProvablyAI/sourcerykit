name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check

      - name: Pytest
        run: uv run pytest -q

      - name: Build wheel
        run: uv run python -m build

  docker:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build "test" image and run suite in container
        uses: docker/build-push-action@v5
        with:
          context: .
          target: test
          load: true
          tags: provably-sdk:test

      - name: Run ruff + pytest inside container
        run: docker run --rm provably-sdk:test

      - name: Build "runtime" image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          load: true
          tags: provably-sdk:runtime

      - name: Smoke-import SDK from runtime image
        run: docker run --rm provably-sdk:runtime

name: Sync Docs to Website
on:
  workflow_run:
    workflows: ["release"]
    types: [completed]

jobs:
  dispatch:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.DOCS_SYNC_APP_ID }}
          private-key: ${{ secrets.DOCS_SYNC_APP_PRIVATE_KEY }}
          repositories: fe-web

      - uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: ProvablyAI/fe-web
          event-type: sync-docs
          client-payload: '{"sha": "${{ github.event.workflow_run.head_sha }}"}'
